name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy-frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_Pv2CZqAqezUWzE3bTNSuGAk6
      VERCEL_PROJECT_ID: prj_FxEnHsMB63rQyFO29JBL9byhXDmD
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env (production)
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-backend:
    name: Backend → GCP VM
    runs-on: ubuntu-latest
    steps:
      - name: SSH to VM, pull, build, restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: supplychainfaraway.duckdns.org
          username: ayux
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd /home/ayux/app
            git fetch --all --tags
            git reset --hard origin/main
            cd backend
            npm ci
            npm run build
            sudo systemctl restart supplychain-backend.service
            sleep 2
            sudo systemctl is-active supplychain-backend.service
