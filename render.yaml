services:
  - type: web
    name: supplychain-backend
    runtime: node
    rootDir: backend
    region: singapore
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLOUD_PROJECT
        value: supplychain-faraway
      - key: VERTEX_AI_LOCATION
        value: us-central1
      - key: FRONTEND_URL
        value: https://frontend-rho-snowy-52.vercel.app
      # Secrets — leave blank in YAML, paste values in the Render dashboard
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_CLOUD_CREDENTIALS_JSON
        sync: false
